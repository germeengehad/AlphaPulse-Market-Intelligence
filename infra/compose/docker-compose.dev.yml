version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: ../docker
    dockerfile: airflow.Dockerfile
  env_file:
    - ../env/.env
  user: "${AIRFLOW_UID}:0"
  environment:
    AIRFLOW_HOME: /opt/airflow
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    PYTHONPATH: /opt/airflow/project
  volumes:
    - ../../:/opt/airflow/project
    - ../../airflow/dags:/opt/airflow/dags
    - ../../database:/opt/airflow/project/database
  depends_on:
    - postgres

services:

  postgres:
    image: postgres:14
    env_file:
      - ../env/.env
    volumes:
      - postgres-db:/var/lib/postgresql/data

  stock_db:
    image: postgres:14
    container_name: stock_postgres
    environment:
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_pass
      POSTGRES_DB: stock_db
    ports:
      - "5433:5432"
    volumes:
      - stock_pgdata:/var/lib/postgresql/data

  airflow-webserver:
    <<: *airflow-common
    ports:
      - "8080:8080"
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --username ${AIRFLOW_ADMIN_USERNAME}
        --password ${AIRFLOW_ADMIN_PASSWORD}
        --firstname Admin
        --lastname User
        --role Admin
        --email ${AIRFLOW_ADMIN_EMAIL} || true &&
      airflow webserver
      "

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "airflow scheduler"

  streamlit:
    build:
      context: ../docker
      dockerfile: streamlit.Dockerfile
    container_name: streamlit_app
    ports:
      - "8501:8501"
    volumes:
      - ../../:/app
    environment:
      PYTHONPATH: /app
      DB_USER: stock_user
      DB_PASSWORD: stock_pass
      DB_HOST: stock_db
      DB_PORT: 5432
      DB_NAME: stock_db
    depends_on:
      - stock_db
 
volumes:
  postgres-db:
  stock_pgdata:

  